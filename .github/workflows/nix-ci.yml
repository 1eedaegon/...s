name: Nix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ── Reusable anchors ──
env:
  CACHIX_CACHE: 3dots
  NIX_CONFIG: |
    extra-substituters = https://3dots.cachix.org
    extra-trusted-public-keys = 3dots.cachix.org-1:pnvCVLIBCnvtknOoDB+36GL9S6ObcbfxsLV6cZm3krI=

jobs:
  check:
    name: Flake Check (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af || true
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Check devShells
        run: |
          SYS=$(nix eval --raw --impure --expr builtins.currentSystem)
          for shell in default rust go py node java; do
            nix eval ".#devShells.${SYS}.${shell}.name" > /dev/null
            echo "✓ devShell ${shell}"
          done

  test-shells:
    name: Test Shells (${{ matrix.os }}, ${{ matrix.shell }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shell: [default, rust, go, py, node, java]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af || true
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build and test ${{ matrix.shell }} shell
        run: |
          SYS=$(nix eval --raw --impure --expr builtins.currentSystem)
          nix build ".#devShells.${SYS}.${{ matrix.shell }}" --no-link
          nix develop ".#${{ matrix.shell }}" --command echo "✓ ${{ matrix.shell }} shell works"

  test-home:
    name: Test Home Configs (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af || true
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Check homeConfiguration
        run: |
          # Deep eval triggers OOM → validate key attributes only
          nix eval .#homeConfigurations.default.config.home.username --impure > /dev/null
          nix eval .#homeConfigurations.default.config.home.homeDirectory --impure > /dev/null
          nix eval .#homeConfigurations.default.config.home.stateVersion --impure > /dev/null
          echo "✓ homeConfiguration is valid"

  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af || true
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE }}
      - name: Check formatting
        run: nix run nixpkgs#nixpkgs-fmt -- --check .
